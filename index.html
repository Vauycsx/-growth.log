<style>
:root{
  color-scheme: dark;
  --bg:#0F1117;
  --surface:#171A23;
  --surface-2:#1F2330;
  --surface-3:#262B3A;
  --border:#2A2F3D;
  --text:#ECEFF6;
  --text-dim:#8B92A6;
  --text-faint:#5A6072;
  --gold:#E8A33D;
  --teal:#45D6B0;
  --violet:#9B8CFB;
  --coral:#FF8B6B;
  --blue:#5AA9FF;
  --pink:#FF7AC6;
  --red:#FF6B6B;
  --radius:14px;
  --mono:'JetBrains Mono', monospace;
  --sans:'Inter', sans-serif;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--sans);
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
::selection{background:var(--gold);color:#0F1117;}
::-webkit-scrollbar{height:8px;width:8px;}
::-webkit-scrollbar-thumb{background:var(--surface-3);border-radius:8px;}
::-webkit-scrollbar-track{background:transparent;}

button{font-family:inherit;cursor:pointer;}
input,select,textarea{font-family:inherit;}
svg{flex-shrink:0;}

#app{max-width:1100px;margin:0 auto;padding:0 20px 80px;}

/* ===== TOPBAR ===== */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:22px 0 18px;
  border-bottom:1px solid var(--border);
  flex-wrap:wrap;gap:14px;
}
.logo{
  font-family:var(--mono);font-weight:700;font-size:18px;letter-spacing:-0.5px;
  display:flex;align-items:center;gap:8px;color:var(--text);
}
.logo .dim{color:var(--text-faint);font-weight:500;}
.logo .cursor{display:inline-block;width:8px;height:16px;background:var(--gold);animation:blink 1.1s steps(1) infinite;}
@keyframes blink{0%,49%{opacity:1;}50%,100%{opacity:0;}}

.profile-cluster{display:flex;align-items:center;gap:14px;}
.pill{
  display:flex;align-items:center;gap:6px;
  background:var(--surface);border:1px solid var(--border);
  padding:7px 12px;border-radius:999px;font-size:13px;font-weight:600;
  color:var(--text-dim);
}
.pill.coral-ic{color:var(--coral);}
.pill b{color:var(--text);font-family:var(--mono);}
.pill.timer-pill{border-color:var(--gold);color:var(--gold);}

.level-badge{display:flex;align-items:center;gap:10px;}
.ring-wrap{position:relative;width:52px;height:52px;flex-shrink:0;}
.ring-wrap svg.ring-svg{transform:rotate(-90deg);width:52px;height:52px;}
.ring-bg{fill:none;stroke:var(--surface-3);stroke-width:5;}
.ring-fg{fill:none;stroke:var(--gold);stroke-width:5;stroke-linecap:round;transition:stroke-dashoffset .6s ease;}
.ring-level{
  position:absolute;top:0;left:0;width:100%;height:100%;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--mono);font-weight:700;font-size:15px;color:var(--gold);
}
.rank-info{line-height:1.25;}
.rank-title{font-size:13px;font-weight:700;color:var(--text);}
.rank-xp{font-size:11px;color:var(--text-faint);font-family:var(--mono);}

/* ===== TABS ===== */
.tabs{
  display:flex;gap:4px;margin:18px 0 26px;
  border-bottom:1px solid var(--border);
  overflow-x:auto;
}
.tab-btn{
  background:none;border:none;color:var(--text-dim);
  padding:10px 16px;font-size:14px;font-weight:600;
  border-bottom:2px solid transparent;white-space:nowrap;
  transition:color .15s, border-color .15s;
  display:flex;align-items:center;gap:6px;
}
.tab-btn:hover{color:var(--text);}
.tab-btn.active{color:var(--gold);border-bottom-color:var(--gold);}

/* ===== CARDS / GRID ===== */
.grid{display:grid;gap:16px;}
.grid-2{grid-template-columns:1fr 1fr;}
.grid-3{grid-template-columns:1fr 1fr 1fr;}
.grid-4{grid-template-columns:repeat(4,1fr);}
@media(max-width:760px){.grid-2,.grid-3,.grid-4{grid-template-columns:1fr 1fr;}}
@media(max-width:480px){.grid-2,.grid-3,.grid-4{grid-template-columns:1fr;}}

.card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:18px 20px;
}
.card-title{
  font-size:12px;font-weight:700;color:var(--text-faint);
  text-transform:uppercase;letter-spacing:.06em;margin:0 0 4px;
  font-family:var(--mono);
}
.stat-num{font-size:28px;font-weight:800;font-family:var(--mono);margin:2px 0;}
.stat-sub{font-size:12px;color:var(--text-dim);}

/* ===== FRIEND WIDGET ===== */
.friend-widget{
  background:linear-gradient(165deg, var(--surface) 0%, var(--surface-2) 130%);
  transition:border-color .2s, transform .15s;
}
.friend-widget:hover{border-color:var(--gold)55;}
.friend-vs-row{display:flex;align-items:center;justify-content:center;gap:14px;}
.friend-vs-side{display:flex;flex-direction:column;align-items:center;gap:6px;}
.friend-vs-lvchip{
  font-size:10px;font-family:var(--mono);font-weight:800;padding:2px 8px;border-radius:6px;border:1px solid;
}
.friend-vs-mid{display:flex;flex-direction:column;align-items:center;gap:3px;flex-shrink:0;}
.friend-vs-streak{
  display:flex;align-items:center;gap:4px;font-family:var(--mono);font-weight:800;font-size:14px;
  color:var(--text-faint);background:var(--surface-3);border:1px solid var(--border);
  border-radius:20px;padding:5px 12px;transition:.3s;
}
.friend-vs-streak.lit{
  color:var(--coral);background:var(--coral)18;border-color:var(--coral)55;
  animation:friendStreakPulse 2s ease-in-out infinite;
}
@keyframes friendStreakPulse{
  0%,100%{box-shadow:0 0 0 0 var(--coral)33;}
  50%{box-shadow:0 0 0 6px var(--coral)00;}
}
.friend-vs-mid-label{font-size:8px;font-family:var(--mono);color:var(--text-faint);text-transform:uppercase;letter-spacing:.04em;}
.friend-widget-stats{
  background:var(--surface-2);border:1px solid var(--border);border-radius:12px;
  padding:12px 14px;margin-bottom:14px;display:flex;flex-direction:column;gap:2px;
}
.friend-record-pill{
  display:flex;align-items:center;justify-content:center;gap:6px;font-size:11px;font-family:var(--mono);
  color:var(--gold);background:var(--gold)14;border:1px solid var(--gold)33;
  border-radius:8px;padding:6px 10px;margin-top:4px;
}

/* ===== HEATMAP ===== */
.heatmap-card{overflow:hidden;}
.heatmap-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:14px;flex-wrap:wrap;gap:6px;}
.heatmap-head h3{margin:0;font-size:14px;font-weight:700;font-family:var(--mono);display:flex;align-items:center;gap:7px;}
.heatmap-head .legend{font-size:11px;color:var(--text-faint);display:flex;align-items:center;gap:5px;}
.legend-sq{width:10px;height:10px;border-radius:2px;display:inline-block;}
.heatmap-scroll{overflow-x:auto;padding-bottom:6px;}
.heatmap-grid{display:flex;gap:3px;}
.heatmap-col{display:flex;flex-direction:column;gap:3px;}
.heatmap-cell{
  width:11px;height:11px;border-radius:2px;background:var(--surface-2);
  position:relative;
}
.heatmap-cell:hover .tip{display:block;}
.tip{
  display:none;position:absolute;bottom:140%;left:50%;transform:translateX(-50%);
  background:#000;color:#fff;font-size:11px;padding:5px 8px;border-radius:6px;
  white-space:nowrap;z-index:10;font-family:var(--mono);box-shadow:0 4px 12px rgba(0,0,0,.4);
}

/* ===== SKILL / CATEGORY BARS ===== */
.skill-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border);}
.skill-row:last-child{border-bottom:none;}
.skill-icon{
  width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.skill-info{flex:1;min-width:0;}
.skill-top{display:flex;justify-content:space-between;font-size:13px;margin-bottom:5px;}
.skill-name{font-weight:700;}
.skill-lvl{font-family:var(--mono);color:var(--text-dim);font-size:12px;}
.bar-track{height:7px;background:var(--surface-2);border-radius:6px;overflow:hidden;}
.bar-fill{height:100%;border-radius:6px;transition:width .5s ease;}

/* ===== BUTTONS ===== */
.btn{
  border-radius:9px;border:1px solid var(--border);background:var(--surface-2);
  color:var(--text);padding:9px 14px;font-size:13px;font-weight:600;
  display:inline-flex;align-items:center;gap:7px;transition:.15s;
}
.btn:hover{background:var(--surface-3);}
.btn-primary{background:var(--gold);border-color:var(--gold);color:#0F1117;}
.btn-primary:hover{background:#f0b358;}
.btn-ghost{background:transparent;border-color:transparent;color:var(--text-dim);}
.btn-ghost:hover{color:var(--text);background:var(--surface-2);}
.btn-danger{color:var(--red);}
.btn-sm{padding:6px 9px;font-size:12px;}
.btn-icon{padding:7px;}
.btn:disabled{opacity:.5;cursor:default;}

.section-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px;}
.section-head h2{font-size:16px;margin:0;font-family:var(--mono);display:flex;align-items:center;gap:8px;}

/* ===== QUEST LIST ===== */
.quest{
  display:flex;align-items:center;gap:12px;padding:13px 16px;
  background:var(--surface);border:1px solid var(--border);border-radius:12px;margin-bottom:8px;
}
.quest-check{
  width:26px;height:26px;border-radius:7px;border:2px solid var(--surface-3);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  color:transparent;transition:.15s;background:transparent;padding:0;
}
.quest-check.done{background:var(--teal);border-color:var(--teal);color:#0F1117;}
.quest-body{flex:1;min-width:0;}
.quest-title{font-weight:600;font-size:14px;}
.quest-title.struck{text-decoration:line-through;color:var(--text-faint);}
.quest-meta{font-size:11px;color:var(--text-faint);font-family:var(--mono);margin-top:2px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.quest-xp{font-family:var(--mono);font-size:12px;font-weight:700;color:var(--gold);white-space:nowrap;}
.tag{
  font-size:10px;padding:2px 7px;border-radius:5px;font-weight:700;
  text-transform:uppercase;letter-spacing:.04em;display:inline-flex;align-items:center;gap:4px;
}

/* ===== ACHIEVEMENTS ===== */
.ach{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:16px;text-align:center;
}
.ach.locked{opacity:.4;}
.ach-icon{margin-bottom:8px;display:flex;justify-content:center;}
.ach-name{font-weight:700;font-size:13px;margin-bottom:4px;}
.ach-desc{font-size:11px;color:var(--text-dim);}

/* ===== ACTIVITY FEED ===== */
.feed-item{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);font-size:13px;}
.feed-item:last-child{border-bottom:none;}
.feed-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.feed-title{flex:1;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.feed-date{color:var(--text-faint);font-size:11px;font-family:var(--mono);white-space:nowrap;}
.feed-xp{font-family:var(--mono);color:var(--gold);font-weight:700;font-size:12px;white-space:nowrap;}

/* ===== EMPTY STATE ===== */
.empty{text-align:center;padding:36px 20px;color:var(--text-dim);}
.empty .e-icon{display:flex;justify-content:center;margin-bottom:10px;color:var(--text-faint);}
.empty p{margin:4px 0;font-size:13px;}

/* ===== MODAL ===== */
.overlay{
  position:fixed;inset:0;background:rgba(8,9,13,.7);backdrop-filter:blur(3px);
  display:none;align-items:center;justify-content:center;z-index:100;padding:20px;
}
.overlay.show{display:flex;}
#overlayPreview{padding:8px;}
.modal{
  background:var(--surface);border:1px solid var(--border);border-radius:16px;
  width:100%;max-width:420px;padding:22px;max-height:88vh;overflow-y:auto;
}
.modal h3{margin:0 0 16px;font-size:16px;font-family:var(--mono);display:flex;align-items:center;gap:9px;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:12px;color:var(--text-dim);margin-bottom:6px;font-weight:600;}
input[type=text],input[type=number],input[type=password],input[type=email],select,textarea{
  background:var(--surface-2);border:1px solid var(--border);
  border-radius:9px;padding:10px 12px;color:var(--text);font-size:14px;font-family:inherit;
}
.field input[type=text],.field input[type=number],.field input[type=password],.field input[type=email],.field select{
  width:100%;
}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--gold);}
.chip-row{display:flex;gap:8px;flex-wrap:wrap;}
.chip{
  border:1px solid var(--border);background:var(--surface-2);color:var(--text-dim);
  padding:8px 13px;border-radius:9px;font-size:12px;font-weight:700;
}
.chip.active{background:var(--gold);color:#0F1117;border-color:var(--gold);}
.color-dot-row{display:flex;gap:8px;flex-wrap:wrap;}
.color-dot{width:26px;height:26px;border-radius:50%;border:2px solid transparent;cursor:pointer;}
.color-dot.active{border-color:#fff;}
.icon-row{display:flex;gap:6px;flex-wrap:wrap;}
.icon-pick{
  width:36px;height:36px;border-radius:8px;background:var(--surface-2);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;color:var(--text-dim);padding:0;
}
.icon-pick.active{border-color:var(--gold);background:var(--surface-3);color:var(--gold);}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;}

/* ===== TOAST ===== */
.toast{
  position:fixed;bottom:24px;right:24px;z-index:200;
  background:var(--surface);border:1px solid var(--gold);border-radius:14px;
  padding:14px 18px;display:flex;align-items:center;gap:12px;
  box-shadow:0 10px 30px rgba(0,0,0,.5);
  animation:toastIn .35s ease;max-width:320px;
}
@keyframes toastIn{from{transform:translateY(20px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.toast-icon{color:var(--gold);}
.toast b{display:block;font-size:13px;}
.toast span{font-size:12px;color:var(--text-dim);}

.confetti-piece{
  position:fixed;top:-10px;width:8px;height:14px;z-index:300;pointer-events:none;
  animation:fall linear forwards;
}
@keyframes fall{to{transform:translateY(105vh) rotate(540deg);opacity:.2;}}

.fab-row{display:flex;gap:8px;flex-wrap:wrap;}

.footer-note{
  text-align:center;color:var(--text-faint);font-size:11px;font-family:var(--mono);
  margin-top:36px;
}
.loading-screen{
  position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:10px;color:var(--text-dim);font-family:var(--mono);font-size:13px;z-index:500;
}

/* ===== AUTH GATE ===== */
#authGate{
  position:fixed;inset:0;z-index:600;display:flex;align-items:center;justify-content:center;
  background:radial-gradient(circle at 30% 20%, #1b2a3a 0%, #0c0e16 55%, #07080d 100%);
  overflow:hidden;
}
#gateCanvas{position:absolute;inset:0;width:100%;height:100%;}
.gate-card{
  position:relative;z-index:2;width:min(380px,90vw);
  background:rgba(23,26,35,.82);backdrop-filter:blur(10px);
  border:1px solid var(--border);border-radius:18px;padding:30px 26px 26px;
  box-shadow:0 20px 60px #000a, 0 0 0 1px #ffffff0a inset;
  animation:gateCardIn .55s cubic-bezier(.2,.8,.25,1), gateCardGlow 4s ease-in-out 1s infinite;
}
@keyframes gateCardIn{0%{opacity:0;transform:translateY(18px) scale(.96);}100%{opacity:1;transform:translateY(0) scale(1);}}
@keyframes gateCardGlow{
  0%,100%{box-shadow:0 20px 60px #000a, 0 0 0 1px #ffffff0a inset, 0 0 0 0 #E8A33D00;}
  50%{box-shadow:0 20px 60px #000a, 0 0 0 1px #ffffff0a inset, 0 0 30px 2px #E8A33D26;}
}
.gate-logo{font-family:var(--mono);font-weight:800;font-size:22px;text-align:center;color:var(--text);letter-spacing:-.02em;
  animation:gateLogoIn .5s ease-out .1s both;}
@keyframes gateLogoIn{0%{opacity:0;transform:translateY(-6px);}100%{opacity:1;transform:translateY(0);}}
.gate-logo .dim{color:var(--text-faint);font-weight:600;}
.gate-tagline{text-align:center;font-size:12px;color:var(--text-faint);margin:6px 0 20px;line-height:1.5;
  animation:gateLogoIn .5s ease-out .2s both;}
.gate-tabs{position:relative;display:flex;gap:6px;background:var(--surface-2);border-radius:10px;padding:4px;margin-bottom:18px;
  animation:gateLogoIn .5s ease-out .28s both;}
.gate-tab-indicator{
  position:absolute;top:4px;left:4px;width:calc(50% - 6px);height:calc(100% - 8px);
  background:var(--gold);border-radius:8px;z-index:0;
  transition:transform .32s cubic-bezier(.3,.9,.3,1.2);
}
.gate-tab{
  position:relative;z-index:1;flex:1;border:none;background:none;padding:8px 0;border-radius:8px;cursor:pointer;
  font-family:var(--mono);font-size:12px;font-weight:700;color:var(--text-faint);transition:color .25s;
}
.gate-tab-active{color:#1a1300;}
.gate-card .field input, .gate-card .field select{margin-bottom:0;transition:border-color .2s, box-shadow .2s;}
.gate-card .field input:focus{box-shadow:0 0 0 3px #E8A33D22;}
.gate-card .field{margin-bottom:12px;animation:gateFieldIn .4s ease-out both;}
.gate-card .field:nth-of-type(1){animation-delay:.32s;}
.gate-card .field:nth-of-type(2){animation-delay:.40s;}
.gate-card .field:nth-of-type(3){animation-delay:.48s;}
@keyframes gateFieldIn{0%{opacity:0;transform:translateY(10px);}100%{opacity:1;transform:translateY(0);}}
.gate-card .field label{font-size:11px;}
#gateFormBody > button.btn-primary{animation:gateFieldIn .4s ease-out .56s both;}
#gateFormBody > .gate-hint{animation:gateFieldIn .4s ease-out .64s both;}
.gate-hint{font-size:11px;color:var(--text-faint);margin-top:12px;text-align:center;line-height:1.5;}

.gate-success-overlay{
  position:fixed;inset:0;z-index:700;display:none;
  align-items:center;justify-content:center;flex-direction:column;gap:14px;
  background:rgba(7,8,13,.86);backdrop-filter:blur(6px);
}
.gate-success-overlay.show{display:flex;}
.gate-check{width:120px;height:120px;}
.gate-check-circle{
  fill:none;stroke:var(--teal);stroke-width:5;
  stroke-dasharray:289;stroke-dashoffset:289;
  animation:gateCheckCircle .55s ease-out forwards;
  transform-origin:center;
}
.gate-check-mark{
  fill:none;stroke:var(--teal);stroke-width:7;stroke-linecap:round;stroke-linejoin:round;
  stroke-dasharray:60;stroke-dashoffset:60;
  animation:gateCheckMark .35s ease-out .5s forwards;
}
@keyframes gateCheckCircle{
  0%{stroke-dashoffset:289;transform:rotate(-90deg) scale(.7);opacity:0;}
  40%{opacity:1;}
  100%{stroke-dashoffset:0;transform:rotate(-90deg) scale(1);opacity:1;}
}
@keyframes gateCheckMark{ to{ stroke-dashoffset:0; } }
.gate-success-text{
  font-family:var(--mono);font-weight:800;font-size:16px;color:var(--text);
  opacity:0;animation:gateTextPop .4s ease-out .75s forwards;
}
@keyframes gateTextPop{0%{opacity:0;transform:translateY(8px) scale(.9);}100%{opacity:1;transform:translateY(0) scale(1);}}

/* ===== GIFT POPUP ===== */
.gift-popup-card{
  max-width:340px;width:90vw;text-align:center;padding:30px 24px 24px;
  background:linear-gradient(160deg, var(--surface) 0%, var(--surface-2) 100%);
  border:1px solid var(--gold)55;
  animation:giftCardBounce .5s cubic-bezier(.25,1.4,.4,1);
}
@keyframes giftCardBounce{
  0%{opacity:0;transform:scale(.6) translateY(20px);}
  60%{opacity:1;transform:scale(1.05) translateY(-4px);}
  100%{opacity:1;transform:scale(1) translateY(0);}
}
.gift-popup-burst{
  width:72px;height:72px;border-radius:50%;margin:0 auto 14px;
  background:radial-gradient(circle, var(--gold)33 0%, transparent 70%);
  display:flex;align-items:center;justify-content:center;color:var(--gold);
  animation:giftBurstSpin 2.4s ease-in-out infinite, giftBurstPop .5s cubic-bezier(.3,1.6,.4,1) .1s both;
}
@keyframes giftBurstPop{0%{transform:scale(0) rotate(-30deg);}100%{transform:scale(1) rotate(0);}}
@keyframes giftBurstSpin{0%,100%{transform:rotate(-6deg) scale(1);}50%{transform:rotate(6deg) scale(1.06);}}
.gift-popup-title{
  font-family:var(--mono);font-weight:800;font-size:18px;color:var(--gold);margin-bottom:14px;
  animation:gateFieldIn .35s ease-out .2s both;
}
.gift-popup-from{
  display:flex;align-items:center;gap:12px;background:var(--surface-3);border-radius:12px;
  padding:10px 14px;margin-bottom:12px;text-align:left;
  animation:gateFieldIn .35s ease-out .28s both;
}
.gift-popup-contents{margin-bottom:6px;animation:gateFieldIn .35s ease-out .36s both;}
.gift-popup-row{
  display:flex;align-items:center;justify-content:center;gap:7px;
  font-size:14px;color:var(--text);padding:6px 0;font-family:var(--mono);
}
.gift-popup-card .modal-actions{animation:gateFieldIn .35s ease-out .44s both;}

/* ===== AVATAR ===== */
.avatar-btn{
  background:none;border:none;padding:0;cursor:pointer;flex-shrink:0;
}
.avatar-circle{
  width:42px;height:42px;border-radius:50%;
  border:2px solid var(--border);
  background:var(--surface-2);
  display:flex;align-items:center;justify-content:center;
  color:var(--gold);font-weight:700;font-family:var(--mono);font-size:16px;
  overflow:hidden;transition:border-color .2s, transform .2s;
}
.avatar-btn:hover .avatar-circle{border-color:var(--gold);transform:scale(1.06);}
.avatar-circle img{width:100%;height:100%;object-fit:cover;display:block;}
.rank-nick{font-size:10px;color:var(--text-faint);font-family:var(--mono);letter-spacing:.02em;margin-bottom:1px;}

/* ===== PROFILE MODAL ===== */
.avatar-upload-zone{
  width:88px;height:88px;border-radius:50%;border:2px dashed var(--border);
  background:var(--surface-2);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  cursor:pointer;margin:0 auto 16px;overflow:visible;position:relative;
  color:var(--text-dim);transition:.2s;gap:4px;font-size:11px;
}
.avatar-upload-zone:hover{border-color:var(--gold);}
.avatar-upload-zone .avatar-circle{
  border:3px solid var(--surface-3);
  box-shadow:0 0 0 2px var(--border), 0 6px 18px #0006;
  transition:box-shadow .2s, border-color .2s;
}
.avatar-upload-zone:hover .avatar-circle{border-color:var(--gold);box-shadow:0 0 0 2px var(--gold)55, 0 8px 22px #0007;}
.avatar-upload-zone:hover{border-color:var(--gold);color:var(--gold);}


/* ===== THEME PICKER ===== */
.theme-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;margin-top:4px;}
.theme-swatch{
  border-radius:10px;border:2px solid transparent;padding:8px 4px 6px;
  text-align:center;cursor:pointer;transition:.15s;position:relative;
}
.theme-swatch:hover{transform:scale(1.05);}
.theme-swatch.active{border-color:var(--text);}
.theme-swatch .sw-bar{height:22px;border-radius:5px;margin-bottom:5px;}
.theme-swatch .sw-name{font-size:9px;font-weight:700;color:var(--text-dim);letter-spacing:.02em;}

/* ===== XP DIFFICULTY HARDER LABELS ===== */
.xp-harder-note{font-size:11px;color:var(--text-faint);margin-top:4px;font-family:var(--mono);}

/* ===== AVATAR FRAMES — CSS-only (unique) ===== */
/* --glow : warm gold pulse */
.frame-gold .avatar-circle{border-color:#E8A33D;animation:fGlow 2.5s ease-in-out infinite;}
@keyframes fGlow{0%,100%{box-shadow:0 0 4px #E8A33D33;}50%{box-shadow:0 0 18px 4px #E8A33Daa;}}
/* --glitch : digital corruption */
.frame-glitch .avatar-circle{animation:fGlitch 4s steps(1) infinite;}
@keyframes fGlitch{
  0%,88%,100%{border-color:var(--text);transform:translate(0);filter:none;}
  89%{border-color:#ff3333;transform:translate(-3px,1px);filter:drop-shadow(3px 0 0 #00D9F5);}
  90%{border-color:#00D9F5;transform:translate(3px,-1px);filter:drop-shadow(-3px 0 0 #ff3333);}
  91%{border-color:var(--text);transform:translate(0);filter:none;}
  96%{border-color:#ff3333;transform:translate(2px,0);filter:drop-shadow(-2px 0 0 #00D9F5);}
  97%{border-color:var(--text);transform:translate(0);filter:none;}
}
/* --crystal : iridescent gem */
.frame-crystal .avatar-circle{animation:fCrystal 3s ease-in-out infinite;}
@keyframes fCrystal{
  0%,100%{border-color:#E8E8FF;box-shadow:0 0 6px #fff4,0 0 16px #C77DFF18,inset 0 0 8px #fff1;}
  33%{border-color:#89CFF0;box-shadow:0 0 10px #89CFF066,inset 0 0 10px #89CFF011;}
  66%{border-color:#C77DFF;box-shadow:0 0 14px #C77DFFaa,0 0 28px #C77DFF33,inset 0 0 12px #C77DFF11;}
}
/* --ripple : expanding rings */
.frame-ripple .avatar-circle{border-color:#4ECDC4;animation:fRipple 2s ease-out infinite;}
@keyframes fRipple{
  0%{box-shadow:0 0 0 0 #4ECDC4cc,0 0 0 0 #4ECDC444;}
  60%{box-shadow:0 0 0 9px #4ECDC400,0 0 0 18px #4ECDC400;}
}
/* --orbit : 8 colored dots rotating */
.frame-orbit .avatar-circle{border-color:transparent !important;animation:fOrbit 1.8s linear infinite;}
@keyframes fOrbit{
  0%  {box-shadow: 0 -24px 0 3px #ff6b6b,17px -17px 0 3px #E8A33D,24px 0 0 3px #45D6B0,17px 17px 0 3px #5AA9FF,0 24px 0 3px #9B8CFB,-17px 17px 0 3px #FF7AC6,-24px 0 0 3px #7FE085,-17px -17px 0 3px #FFD700;}
  25% {box-shadow:24px 0 0 3px #ff6b6b,17px 17px 0 3px #E8A33D,0 24px 0 3px #45D6B0,-17px 17px 0 3px #5AA9FF,-24px 0 0 3px #9B8CFB,-17px -17px 0 3px #FF7AC6,0 -24px 0 3px #7FE085,17px -17px 0 3px #FFD700;}
  50% {box-shadow:0 24px 0 3px #ff6b6b,-17px 17px 0 3px #E8A33D,-24px 0 0 3px #45D6B0,-17px -17px 0 3px #5AA9FF,0 -24px 0 3px #9B8CFB,17px -17px 0 3px #FF7AC6,24px 0 0 3px #7FE085,17px 17px 0 3px #FFD700;}
  75% {box-shadow:-24px 0 0 3px #ff6b6b,-17px -17px 0 3px #E8A33D,0 -24px 0 3px #45D6B0,17px -17px 0 3px #5AA9FF,24px 0 0 3px #9B8CFB,17px 17px 0 3px #FF7AC6,0 24px 0 3px #7FE085,-17px 17px 0 3px #FFD700;}
  100%{box-shadow: 0 -24px 0 3px #ff6b6b,17px -17px 0 3px #E8A33D,24px 0 0 3px #45D6B0,17px 17px 0 3px #5AA9FF,0 24px 0 3px #9B8CFB,-17px 17px 0 3px #FF7AC6,-24px 0 0 3px #7FE085,-17px -17px 0 3px #FFD700;}
}
/* --arcade : retro stepping colors */
.frame-arcade .avatar-circle{animation:fArcade .55s steps(4) infinite;}
@keyframes fArcade{
  0% {border-color:#ff5555;box-shadow:3px 3px 0 0 #ff555566,-3px -3px 0 0 #ff555566;}
  25%{border-color:#E8A33D;box-shadow:3px -3px 0 0 #E8A33D66,-3px 3px 0 0 #E8A33D66;}
  50%{border-color:#45D6B0;box-shadow:-3px 3px 0 0 #45D6B066,3px -3px 0 0 #45D6B066;}
  75%{border-color:#9B8CFB;box-shadow:-3px -3px 0 0 #9B8CFB66,3px 3px 0 0 #9B8CFB66;}
}
/* --static : electric flicker */
.frame-electric .avatar-circle{animation:fStatic .5s steps(2) infinite;}
@keyframes fStatic{
  0%{border-color:#00D9F5;box-shadow:0 0 6px 3px #00D9F5bb,2px 0 0 #00D9F5;}
  50%{border-color:#9B8CFB;box-shadow:0 0 10px 4px #9B8CFBaa,-2px 0 0 #9B8CFB;}
}
/* --halo structural keyframe */
@keyframes haloFloat{0%,100%{transform:translateY(0) rotate(-4deg);}50%{transform:translateY(-5px) rotate(4deg);}}
@keyframes haloGlow{0%,100%{opacity:.7;filter:blur(.5px);}50%{opacity:1;filter:blur(0);}}

/* --arcade */
.frame-arcade .avatar-circle{animation:fArcade .55s steps(4) infinite;}
@keyframes fArcade{
  0% {border-color:#ff5555;box-shadow:3px 3px 0 0 #ff555566,-3px -3px 0 0 #ff555566;}
  25%{border-color:#E8A33D;box-shadow:3px -3px 0 0 #E8A33D66,-3px 3px 0 0 #E8A33D66;}
  50%{border-color:#45D6B0;box-shadow:-3px 3px 0 0 #45D6B066,3px -3px 0 0 #45D6B066;}
  75%{border-color:#9B8CFB;box-shadow:-3px -3px 0 0 #9B8CFB66,3px 3px 0 0 #9B8CFB66;}
}


.frame-picker{display:flex;flex-wrap:wrap;gap:10px;padding:4px 0;}
.frame-pick-item{
  display:flex;flex-direction:column;align-items:center;gap:5px;
  cursor:pointer;padding:8px;border-radius:10px;border:1.5px solid transparent;
  transition:border-color .15s,background .15s;background:var(--surface-2);
}
.frame-pick-item:hover{border-color:var(--border);}
.frame-pick-item.fp-active{border-color:var(--gold);background:var(--surface-3);}
.frame-pick-label{font-family:var(--mono);font-size:9px;color:var(--text-dim);letter-spacing:.04em;}

/* ===== FRAME PREVIEW in shop row ===== */
.frame-preview-wrap{flex-shrink:0;width:32px;height:32px;display:flex;align-items:center;justify-content:center;}
.frame-preview-wrap .avatar-circle{width:28px !important;height:28px !important;font-size:10px;border-width:2px;}


/* ===== SHOP ===== */
.shop-section{margin-bottom:20px;}
.shop-section-hd{
  font-family:var(--mono);font-size:11px;color:var(--text-faint);
  letter-spacing:.07em;padding:8px 0 6px;border-bottom:1px solid var(--border);
  margin-bottom:0;display:flex;align-items:center;gap:6px;
}
.shop-section-hd::before{content:'# ';color:var(--gold);}
.shop-list{display:flex;flex-direction:column;}
.shop-row{
  display:flex;align-items:center;gap:12px;
  padding:11px 16px;background:var(--surface);
  border-bottom:1px solid var(--border);
  transition:background .15s;
}
.shop-row:first-child{border-radius:var(--radius) var(--radius) 0 0;}
.shop-row:last-child{border-radius:0 0 var(--radius) var(--radius);border-bottom:none;}
.shop-row:hover{background:var(--surface-2);}
.shop-row.sr-owned{background:var(--surface-2);}
.shop-row.sr-active{background:var(--surface-3);}
.shop-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.shop-row-name{font-family:var(--mono);font-weight:700;font-size:12px;min-width:110px;color:var(--text);}
.shop-row-desc{flex:1;font-size:11px;color:var(--text-dim);line-height:1.4;}
.shop-row-price{font-family:var(--mono);font-size:11px;color:var(--text-faint);min-width:54px;text-align:right;flex-shrink:0;}
.shop-row-tag{
  font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.05em;
  padding:2px 7px;border-radius:4px;text-transform:uppercase;flex-shrink:0;
}
.sr-tag-owned{background:var(--teal)20;color:var(--teal);border:1px solid var(--teal)44;}
.sr-tag-active{background:var(--gold)20;color:var(--gold);border:1px solid var(--gold)44;}

/* ===== COINS ===== */
.coin-pill{display:flex;align-items:center;gap:5px;font-family:var(--mono);font-weight:700;font-size:13px;color:var(--gold);
  background:var(--surface);border:1px solid var(--border);padding:7px 12px;border-radius:999px;}

/* ===== CHARTS ===== */
.chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;}
@media(max-width:600px){.chart-grid{grid-template-columns:1fr;}}
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;}
.chart-label{font-size:12px;font-weight:700;color:var(--text-faint);font-family:var(--mono);
  display:flex;align-items:center;gap:7px;margin-bottom:14px;text-transform:uppercase;letter-spacing:.05em;}
.chart-locked{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:6px;padding:28px 0;color:var(--text-faint);font-size:13px;text-align:center;
}
.chart-locked .lock-icon{font-size:28px;margin-bottom:4px;}
/* ===== PREVIEW MODAL ===== */
.preview-frame-stage{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:14px;padding:28px 0 16px;
  background:var(--surface-2);border-radius:12px;margin-bottom:12px;
}
.preview-theme-card{
  border-radius:12px;overflow:hidden;border:1px solid var(--border);
  background:var(--bg);margin-bottom:12px;
  box-shadow:0 4px 24px #00000040;
}
.preview-desc{font-size:11px;color:var(--text-dim);font-family:var(--mono);text-align:center;padding:4px 0;}

/* ===== INSTALL PILL ===== */
.install-pill{
  display:none;align-items:center;gap:6px;
  background:var(--gold)14;border:1px solid var(--gold)55;color:var(--gold);
  padding:7px 12px;border-radius:999px;font-size:12px;font-weight:700;
  font-family:var(--mono);cursor:pointer;transition:.15s;white-space:nowrap;
}
.install-pill:hover{background:var(--gold)22;}
.install-pill.show{display:flex;}

/* =========================================================
   MOBILE OPTIMIZATION
   ========================================================= */
html{-webkit-text-size-adjust:100%;text-size-adjust:100%;}
body{overscroll-behavior-y:none;}
button,a,.avatar-btn,.quest-check,.icon-pick,.tab-btn,.color-dot{-webkit-tap-highlight-color:transparent;}

@media(max-width:760px){
  #app{padding:0 16px calc(70px + env(safe-area-inset-bottom));}

  .topbar{padding:16px 0 14px;gap:10px;}
  .logo{font-size:16px;}
  .profile-cluster{gap:8px;flex-wrap:wrap;justify-content:flex-end;row-gap:8px;}
  .pill,.coin-pill{padding:6px 10px;font-size:12px;}
  .level-badge{gap:8px;}
  .ring-wrap{width:44px;height:44px;}
  .ring-wrap svg.ring-svg{width:44px;height:44px;}
  .ring-level{font-size:13px;}
  .rank-title{font-size:12px;}
  .rank-xp{font-size:10px;}
  .avatar-circle{width:36px !important;height:36px !important;font-size:14px;}

  .tabs{
    margin:14px -16px 20px;padding:0 16px 2px;
    gap:2px;-webkit-overflow-scrolling:touch;
    scrollbar-width:none;
  }
  .tabs::-webkit-scrollbar{display:none;}
  .tab-btn{padding:9px 12px;font-size:13px;min-height:40px;}

  .card{padding:15px 16px;border-radius:12px;}
  .stat-num{font-size:24px;}
  .section-head h2{font-size:15px;}

  .grid{gap:12px;}
  .chart-grid{gap:12px;}
  .chart-card{padding:15px 16px;}

  /* Quests */
  .quest{padding:12px 14px;gap:10px;}
  .quest-check{width:28px;height:28px;min-width:28px;}
  .quest-title{font-size:13.5px;}
  .quest-meta{font-size:10.5px;}

  /* Buttons — comfortable touch targets */
  .btn{padding:10px 14px;min-height:40px;font-size:13px;}
  .btn-sm{padding:8px 10px;min-height:34px;}
  .btn-icon{padding:9px;min-width:38px;min-height:38px;justify-content:center;}
  .fab-row{gap:8px;}
  .fab-row .btn{flex:1;justify-content:center;}

  /* Shop rows — stack gracefully */
  .shop-row{flex-wrap:wrap;padding:12px 14px;gap:8px 10px;}
  .shop-row-name{min-width:90px;font-size:11.5px;}
  .shop-row-desc{flex-basis:100%;order:3;font-size:11px;}
  .shop-row-price{margin-left:auto;}

  /* Skill rows */
  .skill-row{gap:10px;padding:11px 0;}
  .skill-icon{width:34px;height:34px;}

  /* Heatmap stays horizontally scrollable */
  .heatmap-cell{width:10px;height:10px;}

  /* Achievements grid tighter */
  .ach{padding:13px 10px;}
  .ach-name{font-size:12px;}
  .ach-desc{font-size:10px;}

  /* Modals become comfortable bottom sheets */
  .overlay{padding:0;align-items:flex-end;}
  .modal{
    max-width:100%;width:100%;border-radius:18px 18px 0 0;
    max-height:92vh;padding:18px 16px calc(18px + env(safe-area-inset-bottom));
    animation:sheetUp .25s ease-out;
  }
  @keyframes sheetUp{from{transform:translateY(24px);opacity:.6;}to{transform:translateY(0);opacity:1;}}
  .gate-card{width:92vw;padding:24px 20px 20px;}

  /* Prevent iOS auto-zoom on focus: inputs need >=16px font */
  input[type=text],input[type=number],input[type=password],input[type=email],select,textarea{
    font-size:16px;padding:11px 12px;
  }

  .toast{
    left:12px;right:12px;bottom:calc(16px + env(safe-area-inset-bottom));
    max-width:none;padding:12px 14px;
  }

  .friend-vs-row{gap:8px;}
  .friend-vs-streak{font-size:12px;padding:4px 9px;}

  .install-pill span.install-label{display:none;}
  .install-pill{padding:8px;}
}

@media(max-width:400px){
  .profile-cluster .pill span.pill-text,
  .rank-title{max-width:120px;overflow:hidden;text-overflow:ellipsis;}
  .stat-num{font-size:21px;}
  .grid-2,.grid-3,.grid-4{grid-template-columns:1fr;}
  .shop-row-name{min-width:0;flex-basis:60%;}
}

@supports(padding:max(0px)){
  .topbar{padding-top:max(16px, env(safe-area-inset-top));}
}
</style>
</head>

async function storageGet(key){
  if(typeof window.storage !== 'undefined' && window.storage && window.storage.get){
    try{
      const res = await window.storage.get(key, false);
      if(res && res.value) return res.value;
    }catch(e){ /* not available here — fall through */ }
  }
  try{ return localStorage.getItem(key); }catch(e){ return null; }
}
async function storageSet(key, value){
  if(typeof window.storage !== 'undefined' && window.storage && window.storage.set){
    try{ await window.storage.set(key, value, false); }catch(e){ /* ignore */ }
  }
  try{ localStorage.setItem(key, value); }catch(e){ console.error('localStorage save failed', e); }
}

async function loadState(){

/* ============ HELPERS ============ */
function todayStr(d){ d = d||new Date(); return d.toISOString().slice(0,10); }

function calcLevel(xp){
  let level=1, totalNeeded=0;
  while(true){
    const needed = Math.round(200*Math.pow(level,1.65));
    if(xp < totalNeeded+needed) break;
    totalNeeded += needed; level++;
    if(level>200) break;
  }
  const needed = Math.round(200*Math.pow(level,1.65));
  return {level, into: xp-totalNeeded, need: needed, pct: Math.min(100, Math.round(100*(xp-totalNeeded)/needed))};
}

function totalXP(s){ return s.categories.reduce((a,c)=>a+c.xp,0); }

function rankTitleFor(level){
  let t = RANKS[0].title;
  for(const r of RANKS){ if(level>=r.min) t=r.title; }
  return t;
}

function calcStreak(s){
  const daysWithActivity = new Set(s.activities.map(a=>a.date));
  if(daysWithActivity.size===0) return 0;
  let streak=0;
  let cursor = new Date();
  if(!daysWithActivity.has(todayStr(cursor))){
    cursor.setDate(cursor.getDate()-1);
    if(!daysWithActivity.has(todayStr(cursor))) return 0;
  }
  while(daysWithActivity.has(todayStr(cursor))){
    streak++;
    cursor.setDate(cursor.getDate()-1);
  }
  return streak;
}

function xpForDate(s, dateStr){
  return s.activities.filter(a=>a.date===dateStr).reduce((a,c)=>a+c.xp,0);
}

function catById(id){ return state.categories.find(c=>c.id===id); }

function addXP(categoryId, amount, title, durationMin){
  const cat = catById(categoryId);
  if(!cat) return;
  const before = calcLevel(totalXP(state));
  cat.xp += amount;
  const earnedCoins = Math.max(1, Math.floor(amount / 15));
  state.coins = (state.coins || 0) + earnedCoins;
  state.activities.unshift({id:'a'+Date.now()+Math.random().toString(36).slice(2,6), date: todayStr(), categoryId, xp: amount, title: title||'Активність'});
  const after = calcLevel(totalXP(state));
  saveState();
  checkAchievements();
  mirrorActivityToLedger(cat, amount, title, durationMin||null);
  if(after.level > before.level){
    const bonusCoins = after.level * 25;
    state.coins += bonusCoins;
    saveState();
    showLevelUp(after.level, bonusCoins);
  }
  render();
}

async function mirrorActivityToLedger(cat, amount, title, durationMin){
  if(!sb || !sbSession) return;
  try{
    const row = {
      user_id: sbSession.user.id, category_id: cat.id, category_name: cat.name,
      xp: Math.max(1, Math.min(300, Math.round(amount))), title: title||'Активність',
      occurred_date: todayStr()
    };
    if(durationMin) row.duration_minutes = durationMin;
    const {error} = await sb.from('activities').insert(row);
    if(error){
      if((error.message||'').includes('daily_xp_cap_exceeded')){
        showToast('Сьогоднішній серверний ліміт XP вичерпано — друзі поки бачать менше, ніж у тебе локально');
      } else {
        console.error('ledger mirror failed', error);
      }
      return;
    }
    // Auto-sync earned XP into active shared goals
    if(amount > 0){
      const {error: ge} = await sb.rpc('sync_xp_to_goals', {p_xp: Math.max(1, Math.min(300, Math.round(amount)))});
      if(ge) console.error('sync_xp_to_goals failed', ge);
      // Read authoritative coin balance — complete_goal may have added bonus coins
      const {data: serverCoins, error: ce} = await sb.rpc('get_my_coins');
      if(!ce && serverCoins !== null){
        const bonus = Number(serverCoins) - (state.coins||0);
        if(bonus > 0){
          state.coins = Number(serverCoins);
          showToast(`🎯 Спільна ціль досягнута! +${bonus} монет`);
          await storageSet('state', JSON.stringify(state));
          render();
        }
      }
      // Reload goals in background to show completed status
      loadFriendsData().then(()=>{ if(activeTab==='friends') render(); });
    }
    await refreshOwnProfile();
  }catch(e){ console.error('ledger mirror failed', e); }
}

let _backfillAttempted = false;
async function backfillLedgerIfNeeded(){
  if(!sb || !sbSession || _backfillAttempted) return;
  _backfillAttempted = true;
  if(!state.activities || !state.activities.length) return;
  const items = state.activities.slice(0, 2000).map(a=>{
    const cat = catById(a.categoryId);
    return {categoryId: a.categoryId, categoryName: cat?cat.name:'?', xp: a.xp, title: a.title, date: a.date};
  });
  try{
    const {error} = await sb.rpc('backfill_local_activities', {p_items: items});
    if(error && !(error.message||'').includes('already_backfilled')){
      console.error('backfill failed', error);
    } else if(!error){
      await refreshOwnProfile();
    }
  }catch(e){ console.error('backfill failed', e); }
}

/* ============ TIMER ============ */
function elapsedMinutes(){
  if(!state.timer || !state.timer.running) return 0;
  return (Date.now()-state.timer.startedAt)/60000;
}
function xpFromMinutes(min){ return Math.max(1, Math.round(min*0.75)); }
function difficultyLabel(min){
  if(min<10) return {label:'Легко', color:'var(--teal)'};
  if(min<25) return {label:'Середньо', color:'var(--gold)'};
  if(min<50) return {label:'Важко', color:'var(--coral)'};
  return {label:'Епічно', color:'var(--violet)'};
}
function startTimer(categoryId, title){
  if(state.timer.running) return;
  state.timer = {running:true, categoryId, title: title||'', startedAt: Date.now()};
  saveState();
  render();
}
function startTimerFromForm(){
  const sel = document.getElementById('timerCategory');
  if(!sel || !sel.value){ alert('Спочатку створи сферу у вкладці «Сфери».'); return; }
  const title = document.getElementById('timerTitle').value.trim();
  startTimer(sel.value, title);
}
function stopTimer(){
  const min = elapsedMinutes();
  if(min < 0.5){ alert('Зачекай хоч 30 секунд перед завершенням.'); return; }
  const xp = xpFromMinutes(min);
  const cat = catById(state.timer.categoryId);
  const title = state.timer.title || `Сесія: ${cat?cat.name:'Активність'} • ${Math.round(min)} хв`;
  const catId = state.timer.categoryId;
  const durationMin = Math.round(min);
  state.timer = {running:false, categoryId:null, title:'', startedAt:null};
  addXP(catId, xp, title, durationMin);
}
function cancelTimer(){
  state.timer = {running:false, categoryId:null, title:'', startedAt:null};
  saveState();
  render();
}
function tickTimer(){
  const pill = document.getElementById('topTimerPill');
  if(!state.timer || !state.timer.running){
    if(pill) pill.style.display='none';
    return;
  }
  const totalSec = Math.max(0, Math.floor((Date.now()-state.timer.startedAt)/1000));
  const mm = String(Math.floor(totalSec/60)).padStart(2,'0');
  const ss = String(totalSec%60).padStart(2,'0');
  const clockStr = `${mm}:${ss}`;
  const min = elapsedMinutes();
  const diff = difficultyLabel(min);
  const xp = xpFromMinutes(min);
  if(pill){
    pill.style.display='flex';
    pill.innerHTML = `${ico('clock',14)} <b>${clockStr}</b>`;
  }
  const clockEl = document.getElementById('timerClock');
  if(clockEl){
    clockEl.textContent = clockStr;
    const diffEl = document.getElementById('timerDiffLive');
    if(diffEl){ diffEl.textContent = diff.label; diffEl.style.color = diff.color; }
    const xpEl = document.getElementById('timerXpLive');
    if(xpEl){ xpEl.textContent = '+'+xp; }
  }
}

/* ============ BUILD AVATAR FRAME (SVG structural) ============ */
function buildAvatarFrame(frameId, size, innerHtml){
  const cls = frameId ? frameId.replace('frame_','') : null;

  if(cls==='cat'){
    const S = size + 30;
    const c = +(S/2).toFixed(1);
    const rA = size/2;
    const pt = (ang, r) => {
      const rad = ang*Math.PI/180;
      return [+(c+r*Math.cos(rad)).toFixed(2), +(c+r*Math.sin(rad)).toFixed(2)];
    };
    // Ear = a segment whose base is an arc lying exactly on the avatar's
    // rim (radius rA), so it visually bends together with the circle,
    // rising to a tip further out. Inner ear is a smaller nested segment.
    const roundedEarPath = (x1,y1,x2,y2,tx,ty,tipRound) => {
      const u1x=tx-x1, u1y=ty-y1, l1=Math.hypot(u1x,u1y);
      const u2x=tx-x2, u2y=ty-y2, l2=Math.hypot(u2x,u2y);
      const nt1=[+(tx-u1x/l1*tipRound).toFixed(2), +(ty-u1y/l1*tipRound).toFixed(2)];
      const nt2=[+(tx-u2x/l2*tipRound).toFixed(2), +(ty-u2y/l2*tipRound).toFixed(2)];
      return `M${x1},${y1} A${rA},${rA} 0 0 1 ${x2},${y2} L${nt2[0]},${nt2[1]} Q${tx},${ty} ${nt1[0]},${nt1[1]} Z`;
    };
    const buildEar = (thetaC, dA, tipR) => {
      const [x1,y1] = pt(thetaC-dA, rA);
      const [x2,y2] = pt(thetaC+dA, rA);
      const [tx,ty] = pt(thetaC, tipR);
      const outer = roundedEarPath(x1,y1,x2,y2,tx,ty,(tipR-rA)*0.26);
      const dA2 = dA*0.5;
      const tipR2 = rA + (tipR-rA)*0.6;
      const [ix1,iy1] = pt(thetaC-dA2, rA+1);
      const [ix2,iy2] = pt(thetaC+dA2, rA+1);
      const [itx,ity] = pt(thetaC, tipR2);
      const inner = roundedEarPath(ix1,iy1,ix2,iy2,itx,ity,(tipR2-(rA+1))*0.3);
      return `<path d="${outer}" fill="#CFCFE2" stroke="#CFCFE2" stroke-width="1.6" stroke-linejoin="round"/><path d="${inner}" fill="#FFA9C7" opacity=".92" stroke="#FFA9C7" stroke-width="1.2" stroke-linejoin="round"/>`;
    };
    const earsSvg = buildEar(-127, 16, rA+size*0.27) + buildEar(-53, 16, rA+size*0.27);

    const noseY = +(c + rA*0.24).toFixed(1);
    const noseSvg = `<path d="M${(c-3.4).toFixed(1)},${(noseY-2).toFixed(1)} Q${c},${(noseY+3.6).toFixed(1)} ${(c+3.4).toFixed(1)},${(noseY-2).toFixed(1)} Q${c},${(noseY-0.4).toFixed(1)} ${(c-3.4).toFixed(1)},${(noseY-2).toFixed(1)} Z" fill="#FF8FB8"/>`;

    const whiskerY = noseY - 0.5;
    const whiskers = (side) => [-1,0,1].map(i=>{
      const y0 = +(whiskerY + i*5.2).toFixed(1);
      const x0 = +(c + side*rA*0.36).toFixed(1);
      const xMid = +(c + side*rA*0.7).toFixed(1);
      const yMid = +(y0 + i*1.4).toFixed(1);
      const x1 = +(c + side*rA*1.05).toFixed(1);
      const y1 = +(y0 + i*3.4).toFixed(1);
      return `<path d="M${x0},${y0} Q${xMid},${yMid} ${x1},${y1}" stroke="#F4F4FC" stroke-width="1.1" fill="none" opacity=".6" stroke-linecap="round"/>`;
    }).join('');

    return `<div style="position:relative;width:${size}px;height:${size}px;display:flex;align-items:center;justify-content:center;">
      <svg viewBox="0 0 ${S} ${S}" style="position:absolute;width:${S}px;height:${S}px;left:50%;top:50%;transform:translate(-50%,-50%);pointer-events:none;overflow:visible;z-index:2;">
        ${earsSvg}${whiskers(-1)}${whiskers(1)}${noseSvg}
      </svg>
      <div class="avatar-circle" style="width:${size}px;height:${size}px;position:relative;z-index:1;">${innerHtml}</div>
    </div>`;
  }

  if(cls==='crown'){
    const cW=Math.round(size*.92), cH=Math.round(size*.38);
    return `<div style="display:flex;flex-direction:column;align-items:center;">
      <svg width="${cW}" height="${cH}" viewBox="0 0 44 16" style="display:block;animation:haloFloat 2.8s ease-in-out infinite;filter:drop-shadow(0 0 5px #E8A33D66);">
        <path d="M 1,15 L 1,6 L 9.5,11 L 15,1 L 22,7 L 29,1 L 34.5,11 L 43,6 L 43,15 Z" fill="#E8A33D"/>
        <rect x="0" y="12.5" width="44" height="3.5" rx="1.5" fill="#C8851E"/>
        <line x1="1" y1="14.2" x2="43" y2="14.2" stroke="#E8B84D" stroke-width=".7" opacity=".5"/>
        <circle cx="22" cy="4.5" r="3.2" fill="#FFE44D"/>
        <circle cx="21.2" cy="3.7" r="1.2" fill="#FFF8C0" opacity=".7"/>
        <circle cx="7.5" cy="9.5" r="2.2" fill="#FF7AC6"/>
        <circle cx="7" cy="9" r=".85" fill="#FFCCE8" opacity=".7"/>
        <circle cx="36.5" cy="9.5" r="2.2" fill="#9B8CFB"/>
        <circle cx="36" cy="9" r=".85" fill="#D4C8FF" opacity=".7"/>
        <path d="M 2,13 Q 22,9.5 42,13" stroke="#FFD700" stroke-width="1.2" fill="none" opacity=".2"/>
      </svg>
      <div class="avatar-circle" style="width:${size}px;height:${size}px;border-color:#E8A33D;">${innerHtml}</div>
    </div>`;
  }

  if(cls==='sakura'){
    const S = size + 26;
    const c = +(S/2).toFixed(1);
    const orbitR = size/2 + 7;
    const defs=[
      {ang:18,  rk:1.00, sk:1.05, col:'#FFB3D6', dur:10.5, del:0,   dir:1},
      {ang:95,  rk:1.18, sk:0.78, col:'#FFC4E0', dur:13,   del:1.6, dir:1},
      {ang:165, rk:0.88, sk:1.15, col:'#FF9EC6', dur:9,    del:3.1, dir:-1},
      {ang:225, rk:1.10, sk:0.70, col:'#FFAAD0', dur:12,   del:4.4, dir:1},
      {ang:290, rk:0.97, sk:0.95, col:'#FFD4EB', dur:14,   del:0.9, dir:-1},
      {ang:340, rk:1.12, sk:0.85, col:'#FFB8D8', dur:11,   del:2.4, dir:1},
    ];
    const petalData = defs.map(p=>{
      const r = +(orbitR*p.rk).toFixed(1);
      const to = p.ang + 360*p.dir;
      const rw = +(3*p.sk).toFixed(1), rh = +(4.8*p.sk).toFixed(1);
      const wobbleDur = +(p.dur/3.4).toFixed(2), pulseDur = +(p.dur/2.2).toFixed(2);
      const tx = +(c+r).toFixed(1);
      return `<g>
        <animateTransform attributeName="transform" type="rotate" from="${p.ang} ${c} ${c}" to="${to} ${c} ${c}" dur="${p.dur}s" begin="${p.del}s" repeatCount="indefinite"/>
        <g transform="translate(${tx},${c})">
          <animateTransform attributeName="transform" type="rotate" values="-16;14;-16" dur="${wobbleDur}s" begin="${p.del}s" repeatCount="indefinite" additive="sum"/>
          <ellipse rx="${rw}" ry="${rh}" fill="${p.col}">
            <animate attributeName="opacity" values=".45;.95;.55;.9;.45" dur="${pulseDur}s" begin="${p.del}s" repeatCount="indefinite"/>
          </ellipse>
        </g>
      </g>`;
    }).join('');
    return `<div style="position:relative;width:${size}px;height:${size}px;display:flex;align-items:center;justify-content:center;">
      <svg viewBox="0 0 ${S} ${S}" style="position:absolute;width:${S}px;height:${S}px;left:50%;top:50%;transform:translate(-50%,-50%);pointer-events:none;overflow:visible;z-index:2;">${petalData}</svg>
      <div class="avatar-circle" style="width:${size}px;height:${size}px;position:relative;z-index:1;">${innerHtml}</div>
    </div>`;
  }

  if(cls==='snake'){
    const S=size+10,c=S/2,r=size/2+1,circ=2*Math.PI*r;
    const dash=Math.round(circ*.22),gap=Math.round(circ*.78);
    const tail=Math.round(circ*.06);
    return `<div style="position:relative;width:${size}px;height:${size}px;display:flex;align-items:center;justify-content:center;">
      <svg style="position:absolute;inset:-5px;width:${S}px;height:${S}px;overflow:visible;" viewBox="0 0 ${S} ${S}">
        <circle cx="${c}" cy="${c}" r="${r}" fill="none" stroke="#45D6B0" stroke-width="2.5"
          stroke-dasharray="${dash} ${gap}" stroke-linecap="round" opacity=".95">
          <animateTransform attributeName="transform" type="rotate" from="0 ${c} ${c}" to="360 ${c} ${c}" dur="1.6s" repeatCount="indefinite"/>
        </circle>
        <circle cx="${c}" cy="${c}" r="${r}" fill="none" stroke="#45D6B077" stroke-width="1.5"
          stroke-dasharray="${tail} ${Math.round(circ*.94)}" stroke-linecap="round">
          <animateTransform attributeName="transform" type="rotate" from="0 ${c} ${c}" to="360 ${c} ${c}" dur="1.6s" repeatCount="indefinite"/>
        </circle>
      </svg>
      <div class="avatar-circle" style="width:${size}px;height:${size}px;">${innerHtml}</div>
    </div>`;
  }

  if(cls==='petals'){
    const S=size+28,c=S/2,pr=size/2+11;
    const cols=['#FF9EC6','#FFB8D8','#FF88BB','#FFC4E0','#FFAAD0'];
    const petals=[0,72,144,216,288].map((a,i)=>
      `<ellipse cx="0" cy="-${pr}" rx="${Math.round(size*.1)}" ry="${Math.round(size*.17)}" fill="${cols[i]}" opacity=".88" transform="rotate(${a})"/>`
    ).join('');
    return `<div style="position:relative;width:${size}px;height:${size}px;display:flex;align-items:center;justify-content:center;">
      <svg style="position:absolute;inset:-14px;width:${S}px;height:${S}px;overflow:visible;" viewBox="0 0 ${S} ${S}">
        <g transform="translate(${c},${c})">
          <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="8s" repeatCount="indefinite" additive="sum"/>
          ${petals}
        </g>
      </svg>
      <div class="avatar-circle" style="width:${size}px;height:${size}px;">${innerHtml}</div>
    </div>`;
  }

  if(cls==='halo'){
    const hW=Math.round(size*.74),hH=Math.round(hW*.36);
    return `<div style="display:flex;flex-direction:column;align-items:center;">
      <div style="width:${hW}px;height:${hH}px;border:2.5px solid #E8A33D;border-radius:50%;
        margin-bottom:-5px;animation:haloFloat 2.2s ease-in-out infinite,haloGlow 2.2s ease-in-out infinite;
        box-shadow:0 0 10px #E8A33D66,0 2px 20px #E8A33D22;"></div>
      <div class="avatar-circle" style="width:${size}px;height:${size}px;">${innerHtml}</div>
    </div>`;
  }

  // CSS-only
  return `<div class="${cls?'avatar-btn frame-'+cls:''}" style="pointer-events:none;">
    <div class="avatar-circle" style="width:${size}px;height:${size}px;">${innerHtml}</div>
  </div>`;
}

function renderTopbar(){
  // Use server-computed values when logged in (these survive local storage resets)
  // and fall back to local calculation when offline or not logged in.
  const serverLevel  = sbProfile?.level    ?? null;
  const serverXP     = sbProfile?.total_xp ?? null;
  const serverStreak = sbProfile?.streak   ?? null;
  const localLvl = calcLevel(totalXP(state));
  const lvl = (serverLevel && serverXP) ? {
    level: serverLevel,
    pct: (() => {
      let tot = 0;
      for(let l=1; l<serverLevel; l++) tot += Math.round(200*Math.pow(l,1.65));
      const need = Math.round(200*Math.pow(serverLevel,1.65));
      const into = serverXP - tot;
      return Math.min(100, Math.round(into/need*100));
    })(),
    into: serverXP - (() => { let t=0; for(let l=1;l<serverLevel;l++) t+=Math.round(200*Math.pow(l,1.65)); return t; })(),
    need: Math.round(200*Math.pow(serverLevel,1.65)),
  } : localLvl;
  const streak = serverStreak ?? calcStreak(state);
  const circumference = 2*Math.PI*22;
  const offset = circumference - (lvl.pct/100)*circumference;
  document.getElementById('ringFg').style.strokeDasharray = circumference;
  document.getElementById('ringFg').style.strokeDashoffset = offset;
  document.getElementById('ringLevel').textContent = lvl.level;
  document.getElementById('rankTitle').textContent = rankTitleFor(lvl.level);
  document.getElementById('rankXp').textContent = `${fmtXP(lvl.into)} / ${fmtXP(lvl.need)} XP`;
  document.getElementById('streakPill').innerHTML = `${ico('flame',16)} стрік <b>${streak}</b> дн`;
  const coinEl = document.getElementById('coinCount');
  if(coinEl) coinEl.textContent = state.coins || 0;

  const frameId = state.shopEquipped?.frame || null;
  const isSvg = SHOP_ITEMS.find(i=>i.id===frameId)?.svg;
  const avBtn = document.getElementById('profileAvatarBtn');
  if(avBtn){
    if(frameId && isSvg){
      avBtn.className = 'avatar-btn';
      avBtn.innerHTML = buildAvatarFrame(frameId, 42, avatarInnerHtml());
    } else {
      const cls = frameId ? frameId.replace('frame_','') : null;
      avBtn.className = 'avatar-btn' + (cls ? ` frame-${cls}` : '');
      avBtn.innerHTML = `<div class="avatar-circle" style="width:42px;height:42px;">${avatarInnerHtml()}</div>`;
    }
  }
  const nickEl = document.getElementById('rankNick');
  if(nickEl) nickEl.textContent = state.profile?.nick || '';
}

function renderHeatmap(){
  const weeks = 26;
  const days = weeks*7;
  const todayDate = new Date();
  todayDate.setHours(0,0,0,0);
  const cells = [];
  for(let i=days-1;i>=0;i--){
    const d = new Date(todayDate);
    d.setDate(d.getDate()-i);
    cells.push(todayStr(d));
  }
  let cols = [];
  for(let i=0;i<cells.length;i+=7) cols.push(cells.slice(i,i+7));
  const maxXp = Math.max(1, ...cells.map(c=>xpForDate(state,c)));
  const colsHtml = cols.map(col=>{
    const rows = col.map(dateStr=>{
      const xp = xpForDate(state, dateStr);
      let bg = 'var(--surface-2)';
      if(xp>0){
        const ratio = xp/maxXp;
        if(ratio>0.66) bg='var(--gold)';
        else if(ratio>0.33) bg='#a87a2c';
        else bg='#5c4520';
      }
      const isFuture = new Date(dateStr) > todayDate;
      return `<div class="heatmap-cell" style="background:${isFuture?'transparent':bg}">${xp>0?`<div class="tip">${dateStr} · +${xp} XP</div>`:''}</div>`;
    }).join('');
    return `<div class="heatmap-col">${rows}</div>`;
  }).join('');
  return `<div class="heatmap-grid">${colsHtml}</div>`;
}

function selfQuestCompletionsToday(){
  const t = todayStr();
  if(!state.selfQuestLog || state.selfQuestLog.date !== t) return 0;
  return state.selfQuestLog.count;
}
function recordSelfQuestCompletion(){
  const t = todayStr();
  if(!state.selfQuestLog || state.selfQuestLog.date !== t) state.selfQuestLog = {date:t, count:0};
  state.selfQuestLog.count++;
}

function toggleQuest(id){
  const q = state.quests.find(x=>x.id===id);
  if(!q) return;
  const t = todayStr();
  if(q.type==='once'){
    if(q.completed) return;
    if(selfQuestCompletionsToday() >= 3){ showToast('Можна виконати лише 3 квести на день — решта зачекає до завтра'); return; }
    q.completed = true;
    recordSelfQuestCompletion();
    addXP(q.categoryId, q.xp, q.title);
    return;
  }
  if(q.lastDone===t) return;
  if(selfQuestCompletionsToday() >= 3){ showToast('Можна виконати лише 3 квести на день — решта зачекає до завтра'); return; }
  const yesterday = todayStr(new Date(Date.now()-86400000));
  q.streak = (q.lastDone===yesterday) ? (q.streak||0)+1 : 1;
  q.lastDone = t;
  recordSelfQuestCompletion();
  addXP(q.categoryId, q.xp, q.title);
}

function deleteQuest(id){
  state.quests = state.quests.filter(q=>q.id!==id);
  saveState(); render();
  if(sb && sbSession) sb.rpc('delete_quest', {p_id: id}).catch(e=>console.error('delete_quest failed',e));
}
